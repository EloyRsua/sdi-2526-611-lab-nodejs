<div id="widget-agregar">
  <div id="add-errors"></div>
  <div class="form-group">
    <label class="control-label col-sm-2" for="title-add">Nombre:</label>
    <div class="col-sm-10">
      <input type="text" class="form-control" name="title-add"
             placeholder="Título de la canción (mín. 3 caracteres)" id="title-add" />
    </div>
  </div>
  <div class="form-group">
    <label class="control-label col-sm-2" for="kind-add">Género:</label>
    <div class="col-sm-10">
      <select class="form-control" id="kind-add" name="kind-add">
        <option value="">-- Selecciona un género --</option>
        <option value="pop">Pop</option>
        <option value="folk">Folk</option>
        <option value="rock">Rock</option>
        <option value="reagge">Reggae</option>
        <option value="rap">Hip-hop Rap</option>
        <option value="latino">Latino</option>
        <option value="blues">Blues</option>
        <option value="otros">Otros</option>
      </select>
    </div>
  </div>
  <div class="form-group">
    <label class="control-label col-sm-2" for="price-add">Precio (€):</label>
    <div class="col-sm-10">
      <input type="number" step="0.01" min="0.01" class="form-control" name="price-add"
             placeholder="2.50" id="price-add" />
    </div>
  </div>
  <div class="col-sm-offset-2 col-sm-10">
    <button type="button" class="btn btn-primary" id="boton-add"
            onclick="widgetAddSong()">Nueva canción</button>
    <button type="button" class="btn" onclick="widgetSongs()">Cancelar</button>
  </div>
</div>
<script>
  function widgetAddSong() {
    $("#add-errors").empty();

    $.ajax({
      url: URLbase + "/songs",
      type: "POST",
      data: {
        title: $("#title-add").val(),
        kind: $("#kind-add").val(),
        price: $("#price-add").val()
      },
      dataType: 'json',
      headers: { "token": token },
      success: function (response) {
        $("#main-container").load("widget-songs.html");
      },
      error: function (xhr) {
        let html = '<div class="alert alert-danger"><ul>';
        try {
          const resp = JSON.parse(xhr.responseText);
          if (resp.errors && resp.errors.length > 0) {
            resp.errors.forEach(e => { html += '<li>' + e + '</li>'; });
          } else if (resp.error) {
            html += '<li>' + resp.error + '</li>';
          } else {
            html += '<li>Error al crear la canción.</li>';
          }
        } catch (e) {
          html += '<li>Error de comunicación con el servidor.</li>';
        }
        html += '</ul></div>';
        $("#add-errors").html(html);
      }
    });
  }
</script>
