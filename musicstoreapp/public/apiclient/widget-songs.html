<div id="widget-songs">
    <div id="songs-errors"></div>
    <button class="btn btn-primary" onclick="widgetAddSong()">Nueva Canción</button>
    <button class="btn" onclick="loadSongs()">Actualizar</button>
    <input type="text" class="form-control" placeholder="Filtrar por nombre" id="filter-byname"/>
    <table class="table table-hover">
        <thead>
        <tr>
            <th><a onclick="sortByTitle()">Título</a></th>
            <th>Género</th>
            <th><a onclick="sortByPrice()">Precio</a></th>
            <th class="col-md-1"></th>
        </tr>
        </thead>
        <tbody id="songsTableBody"></tbody>
    </table>
</div>
<script>
    window.history.pushState("", "", "/apiclient/client.html?w=songs");
    var selectedSongId;
    var songs;

    $('#filter-byname').on('input', function (e) {
        let filterValue = $("#filter-byname").val();
        let filteredSongs = songs.filter(song => song.title.toLowerCase().includes(filterValue.toLowerCase()));
        updateSongsTable(filteredSongs);
    });

    function loadSongs() {
        $.ajax({
            url: URLbase + "/songs",
            type: "GET",
            data: {},
            dataType: 'json',
            headers: {"token": token},
            success: function (response) {
                songs = response.songs;
                updateSongsTable(songs);
            },
            error: function (error) {
                $("#main-container").load("widget-login.html");
            }
        });
    }

    function updateSongsTable(songs) {
        $("#songsTableBody").empty();
        for (let i = 0; i < songs.length; i++) {
            $("#songsTableBody").append(
                "<tr id=" + songs[i]._id + ">" +
                "<td>" + songs[i].title + "</td>" +
                "<td>" + songs[i].kind + "</td>" +
                "<td>" + songs[i].price + "</td>" +
                "<td>" +
                "<a onclick=songDetail('" + songs[i]._id + "')>Detalles</a><br>" +
                "<a onclick=songDelete('" + songs[i]._id + "')>Eliminar</a>" +
                "</td>" +
                "</tr>");
        }
    }

    loadSongs();

    function songDelete(_id) {
        $("#songs-errors").empty();
        $.ajax({
            url: URLbase + "/songs/" + _id,
            type: "DELETE",
            data: {},
            dataType: 'json',
            headers: {"token": token},
            success: function (response) {
                $("#" + _id).remove();
            },
            error: function (xhr) {
                const resp = xhr.responseJSON;
                let mensaje = "Error al eliminar la canción.";
                if (xhr.status === 403) {
                    mensaje = "No puedes eliminar esta canción porque no te pertenece.";
                } else if (resp && resp.error) {
                    mensaje = resp.error;
                }
                $("#songs-errors").html(
                    "<div class='alert alert-danger'>" + mensaje + "</div>"
                );
            }
        });
    }

    function songDetail(_id) {
        selectedSongId = _id;
        $("#main-container").load("widget-detail.html");
    }
</script>
